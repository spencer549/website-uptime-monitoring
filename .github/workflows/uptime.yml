name: Weekly uptime check

on:
  schedule:
    # Primary: Friday 01:17 UTC = Friday 09:17 Asia/Manila (UTC+8)
    - cron: '17 1 * * 5'
    # Backup: Friday 04:17 UTC = Friday 12:17 Asia/Manila (runs 3 hrs later in case GitHub skips the primary)
    - cron: '17 4 * * 5'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - run: python check_sites.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
